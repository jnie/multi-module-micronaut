mma:
  outbound:
    advice-slip-api:
      url: "https://api.adviceslip.com"

micronaut:
  application:
    name: multi-module-micronaut
  server:
    port: 8080
  datasource:
    db:
      driver: h2
      url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
      schema-generate: CREATE_DROP
      username: sa
      password: ''
  r2dbc:
    datasources:
      default:
        url: r2dbc:h2:mem:///testdb
        driver: h2
        schema-generate: CREATE_DROP
        username: sa
        password: ''

# OpenAPI / Swagger configuration
openapi:
  title: Multi-Module Micronaut API
  description: API for the multi-module architecture proof-of-concept
  version: 0.0.1
  server:
    url: http://localhost:8080

endpoints:
  health:
    enabled: true
    sensitive: false