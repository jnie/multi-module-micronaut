mma:
  outbound:
    advice-slip-api:
      url: "https://api.adviceslip.com"

micronaut:
  application:
    name: multi-module-micronaut
  server:
    port: 8080
  openapi:
    additional:
      files-merge-mode: append

openapi:
  title: Multi-Module Micronaut API
  description: API for the multi-module architecture proof-of-concept
  version: 0.0.1
  server:
    url: http://localhost:8080

endpoints:
  health:
    enabled: true
    sensitive: false