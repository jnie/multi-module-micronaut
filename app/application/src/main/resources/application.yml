mma:
  outbound:
    advice-slip-api:
      url: "https://api.adviceslip.com"

micronaut:
  application:
    name: multi-module-micronaut
  server:
    port: 8080
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**

# OpenAPI / Swagger configuration
openapi:
  title: Multi-Module Micronaut API
  description: API for the multi-module architecture proof-of-concept
  version: 0.0.1
  server:
    url: http://localhost:8080
  swagger-ui:
    enabled: true
    path: /swagger-ui

endpoints:
  health:
    enabled: true
    sensitive: false